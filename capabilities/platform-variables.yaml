naftiko: 1.0.0-alpha2
info:
  label: PolyAPI Platform API — Variables
  description: 'PolyAPI Platform API — Variables. 5 operations. Lead operation: PolyAPI List variables. Self-contained Naftiko
    capability covering one Polyapi business surface.'
  tags:
  - Polyapi
  - Variables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POLYAPI_API_KEY: POLYAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-variables
    baseUri: https://na1.polyapi.io
    description: PolyAPI Platform API — Variables business capability. Self-contained, no shared references.
    resources:
    - name: variables
      path: /variables
      operations:
      - name: listvariables
        method: GET
        description: PolyAPI List variables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createvariable
        method: POST
        description: PolyAPI Create a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: variables-variableId
      path: /variables/{variableId}
      operations:
      - name: getvariable
        method: GET
        description: PolyAPI Get a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatevariable
        method: PATCH
        description: PolyAPI Update a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletevariable
        method: DELETE
        description: PolyAPI Delete a variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.POLYAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-variables-rest
    port: 8080
    description: REST adapter for PolyAPI Platform API — Variables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/variables
      name: variables
      description: REST surface for variables.
      operations:
      - method: GET
        name: listvariables
        description: PolyAPI List variables
        call: platform-variables.listvariables
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createvariable
        description: PolyAPI Create a variable
        call: platform-variables.createvariable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/variables/{variableid}
      name: variables-variableid
      description: REST surface for variables-variableId.
      operations:
      - method: GET
        name: getvariable
        description: PolyAPI Get a variable
        call: platform-variables.getvariable
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatevariable
        description: PolyAPI Update a variable
        call: platform-variables.updatevariable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletevariable
        description: PolyAPI Delete a variable
        call: platform-variables.deletevariable
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-variables-mcp
    port: 9090
    transport: http
    description: MCP adapter for PolyAPI Platform API — Variables. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: polyapi-list-variables
      description: PolyAPI List variables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-variables.listvariables
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-create-variable
      description: PolyAPI Create a variable
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-variables.createvariable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-get-variable
      description: PolyAPI Get a variable
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-variables.getvariable
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-update-variable
      description: PolyAPI Update a variable
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: platform-variables.updatevariable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-delete-variable
      description: PolyAPI Delete a variable
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-variables.deletevariable
      outputParameters:
      - type: object
        mapping: $.
