        idempotent: true
      call: platform-jobs.getjob
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-update-job
      description: PolyAPI Update a job
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: platform-jobs.updatejob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-delete-job
      description: PolyAPI Delete a job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-jobs.deletejob
      outputParameters:
      - type: object
        mapping: $.
