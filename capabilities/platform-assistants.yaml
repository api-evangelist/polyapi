naftiko: 1.0.0-alpha2
info:
  label: PolyAPI Platform API — Assistants
  description: 'PolyAPI Platform API — Assistants. 4 operations. Lead operation: PolyAPI List conversations. Self-contained
    Naftiko capability covering one Polyapi business surface.'
  tags:
  - Polyapi
  - Assistants
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    POLYAPI_API_KEY: POLYAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-assistants
    baseUri: https://na1.polyapi.io
    description: PolyAPI Platform API — Assistants business capability. Self-contained, no shared references.
    resources:
    - name: assistants-slug-conversations
      path: /assistants/{slug}/conversations
      operations:
      - name: listconversations
        method: GET
        description: PolyAPI List conversations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: The assistant slug identifier.
          required: true
      - name: createconversation
        method: POST
        description: PolyAPI Create a conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: The assistant slug identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: assistants-slug-conversations-conversationSlug
      path: /assistants/{slug}/conversations/{conversationSlug}
      operations:
      - name: getconversation
        method: GET
        description: PolyAPI Get a conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: The assistant slug identifier.
          required: true
        - name: conversationSlug
          in: path
          type: string
          description: The conversation slug identifier.
          required: true
      - name: deleteconversation
        method: DELETE
        description: PolyAPI Delete a conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: The assistant slug identifier.
          required: true
        - name: conversationSlug
          in: path
          type: string
          description: The conversation slug identifier.
          required: true
    authentication:
      type: bearer
      token: '{{env.POLYAPI_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-assistants-rest
    port: 8080
    description: REST adapter for PolyAPI Platform API — Assistants. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/assistants/{slug}/conversations
      name: assistants-slug-conversations
      description: REST surface for assistants-slug-conversations.
      operations:
      - method: GET
        name: listconversations
        description: PolyAPI List conversations
        call: platform-assistants.listconversations
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createconversation
        description: PolyAPI Create a conversation
        call: platform-assistants.createconversation
        with:
          slug: rest.slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assistants/{slug}/conversations/{conversationslug}
      name: assistants-slug-conversations-conversationslug
      description: REST surface for assistants-slug-conversations-conversationSlug.
      operations:
      - method: GET
        name: getconversation
        description: PolyAPI Get a conversation
        call: platform-assistants.getconversation
        with:
          slug: rest.slug
          conversationSlug: rest.conversationSlug
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteconversation
        description: PolyAPI Delete a conversation
        call: platform-assistants.deleteconversation
        with:
          slug: rest.slug
          conversationSlug: rest.conversationSlug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-assistants-mcp
    port: 9090
    transport: http
    description: MCP adapter for PolyAPI Platform API — Assistants. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: polyapi-list-conversations
      description: PolyAPI List conversations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-assistants.listconversations
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-create-conversation
      description: PolyAPI Create a conversation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-assistants.createconversation
      with:
        slug: tools.slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-get-conversation
      description: PolyAPI Get a conversation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-assistants.getconversation
      with:
        slug: tools.slug
        conversationSlug: tools.conversationSlug
      outputParameters:
      - type: object
        mapping: $.
    - name: polyapi-delete-conversation
      description: PolyAPI Delete a conversation
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-assistants.deleteconversation
      with:
        slug: tools.slug
        conversationSlug: tools.conversationSlug
      outputParameters:
      - type: object
        mapping: $.
