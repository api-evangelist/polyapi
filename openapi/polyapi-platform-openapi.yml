        - $ref: '#/components/parameters/schemaIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaInput'
      responses:
        '200':
          description: The updated schema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteSchema
      summary: Delete a schema
      description: Delete a specific schema by its ID.
      tags:
        - Schemas
      parameters:
        - $ref: '#/components/parameters/schemaIdParam'
      responses:
        '204':
          description: The schema was deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /environments:
    get:
      operationId: listEnvironments
      summary: List environments
      description: Retrieve a list of all environments.
      tags:
        - Environments
      responses:
        '200':
          description: A list of environments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /environments/{environmentId}:
    get:
      operationId: getEnvironment
      summary: Get an environment
      description: Retrieve details of a specific environment by its ID.
      tags:
        - Environments
      parameters:
        - $ref: '#/components/parameters/environmentIdParam'
      responses:
        '200':
          description: The environment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /assistants/{slug}/conversations:
    get:
      operationId: listConversations
      summary: List conversations
      description: Retrieve a list of all conversations for a specific assistant.
      tags:
        - Assistants
      parameters:
        - name: slug
          in: path
          required: true
          description: The assistant slug identifier.
          schema:
            type: string
      responses:
        '200':
          description: A list of conversations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createConversation
      summary: Create a conversation
      description: Create a new conversation with the specified assistant.
      tags:
        - Assistants
      parameters:
        - name: slug
          in: path
          required: true
          description: The assistant slug identifier.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationInput'
      responses:
        '201':
          description: The created conversation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /assistants/{slug}/conversations/{conversationSlug}:
    get:
      operationId: getConversation
      summary: Get a conversation
      description: Retrieve details of a specific conversation.
      tags:
        - Assistants
      parameters:
        - name: slug
          in: path
          required: true
          description: The assistant slug identifier.
          schema:
            type: string
        - name: conversationSlug
          in: path
          required: true
          description: The conversation slug identifier.
          schema:
            type: string
      responses:
        '200':
          description: The conversation details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteConversation
      summary: Delete a conversation
      description: Delete a specific conversation.
      tags:
        - Assistants
      parameters:
        - name: slug
          in: path
          required: true
          description: The assistant slug identifier.
          schema:
            type: string
        - name: conversationSlug
          in: path
          required: true
          description: The conversation slug identifier.
          schema:
            type: string
      responses:
        '204':
          description: The conversation was deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: >-
        PolyAPI uses Bearer token authentication. Include your API key in
        the Authorization header as 'Bearer {your-api-key}'.

  parameters:
    functionIdParam:
      name: functionId
      in: path
      required: true
      description: The unique identifier of the function.
      schema:
        type: string
    webhookIdParam:
      name: webhookId
      in: path
      required: true
      description: The unique identifier of the webhook.
      schema:
        type: string
    variableIdParam:
      name: variableId
      in: path
      required: true
      description: The unique identifier of the variable.
      schema:
        type: string
    triggerIdParam:
      name: triggerId
      in: path
      required: true
      description: The unique identifier of the trigger.
      schema:
        type: string
    jobIdParam:
      name: jobId
      in: path
      required: true
      description: The unique identifier of the job.
      schema:
        type: string
    schemaIdParam:
      name: schemaId
      in: path
      required: true
      description: The unique identifier of the schema.
      schema:
        type: string
    environmentIdParam:
      name: environmentId
      in: path
      required: true
      description: The unique identifier of the environment.
      schema:
        type: string
    limitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        default: 25
    offsetParam:
      name: offset
      in: query
      required: false
      description: Number of items to skip for pagination.
      schema:
        type: integer
        default: 0

  responses:
    Unauthorized:
      description: Authentication is required or the provided credentials are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    ApiFunction:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the API function.
        name:
          type: string
          description: The name of the API function.
        description:
          type: string
          description: A description of what the API function does.
        context:
          type: string
          description: The context path for organizing the function in the catalog.
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          description: The HTTP method used by the API function.
        url:
          type: string
          format: uri
          description: The target URL for the API call.
        headers:
          type: object
          additionalProperties:
            type: string
          description: HTTP headers to include in the API call.
        requestBody:
          type: object
          description: The request body schema for the API call.
        responseSchema:
          type: object
          description: The expected response schema.
        state:
          type: string
          enum:
            - active
            - inactive
            - deprecated
          description: The lifecycle state of the function.
        owner:
          type: string
          description: The owner of the function.
        visibility:
          type: string
          enum:
            - public
            - private
          description: The visibility of the function.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the function was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the function was last updated.

    ApiFunctionInput:
      type: object
      required:
        - name
        - method
        - url
      properties:
        name:
          type: string
          description: The name of the API function.
        description:
          type: string
          description: A description of what the API function does.
        context:
          type: string
          description: The context path for organizing the function.
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          description: The HTTP method for the API call.
        url:
          type: string
          format: uri
          description: The target URL for the API call.
        headers:
          type: object
          additionalProperties:
            type: string
          description: HTTP headers to include.
        requestBody:
          type: object
          description: The request body schema.
        responseSchema:
          type: object
          description: The expected response schema.

    ServerFunction:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the server function.
        name:
          type: string
          description: The name of the server function.
        description:
          type: string
          description: A description of what the server function does.
        context:
          type: string
          description: The context path for organizing the function.
        language:
          type: string
          enum:
            - typescript
            - python
            - java
            - csharp
          description: The programming language of the function.
        code:
          type: string
          description: The function source code.
        deploymentId:
          type: string
          description: The deployment identifier for the function.
        state:
          type: string
          enum:
            - active
            - inactive
            - deprecated
          description: The lifecycle state of the function.
        owner:
          type: string
          description: The owner of the function.
        visibility:
          type: string
          enum:
            - public
            - private
          description: The visibility of the function.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServerFunctionInput:
      type: object
      required:
        - name
        - language
        - code
      properties:
        name:
          type: string
          description: The name of the server function.
        description:
          type: string
          description: A description of what the function does.
        context:
          type: string
          description: The context path for organizing the function.
        language:
          type: string
          enum:
            - typescript
            - python
            - java
            - csharp
          description: The programming language.
        code:
          type: string
          description: The function source code.

    ClientFunction:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the client function.
        name:
          type: string
          description: The name of the client function.
        description:
          type: string
          description: A description of what the client function does.
        context:
          type: string
          description: The context path for organizing the function.
        language:
          type: string
          enum:
            - typescript
            - python
            - java
            - csharp
          description: The programming language.
        code:
          type: string
          description: The function source code.
        state:
          type: string
          enum:
            - active
            - inactive
            - deprecated
        owner:
          type: string
        visibility:
          type: string
          enum:
            - public
            - private
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ClientFunctionInput:
      type: object
      required:
        - name
        - language
        - code
      properties:
        name:
          type: string
        description:
          type: string
        context:
          type: string
        language:
          type: string
          enum:
            - typescript
            - python
            - java
            - csharp
        code:
          type: string

    FunctionExecutionInput:
      type: object
      properties:
        args:
          type: array
          items:
            description: Function arguments, which may include PolyVariable objects for variable injection.
          description: >-
            The arguments to pass to the function. Variables can be injected
            using PolyVariable objects with pathIdentifier fields.
        polyCustom:
          type: object
          properties:
            async:
              type: boolean
              description: Whether to execute the function asynchronously.
          description: >-
            Custom execution options for server functions, including async
            execution and response handling.

    FunctionExecutionResult:
      type: object
      properties:
        result:
          description: The return value of the function execution.
        executionId:
          type: string
          description: The unique identifier for this execution.
        executionTime:
          type: number
          description: The execution time in milliseconds.

    Webhook:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the webhook.
        name:
          type: string
          description: The name of the webhook.
        description:
          type: string
          description: A description of the webhook.
        context:
          type: string
          description: The context path for organizing the webhook.
        url:
          type: string
          format: uri
          description: The webhook endpoint URL.
        authentication:
          type: object
          description: Authentication configuration for the webhook.
        state:
          type: string
          enum:
            - active
            - inactive
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WebhookInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        context:
          type: string
        authentication:
          type: object
          description: Authentication configuration for the webhook.

    Variable:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the variable.
        name:
          type: string
          description: The name of the variable.
        description:
          type: string
          description: A description of the variable.
        pathIdentifier:
          type: string
          description: >-
            The path identifier used to reference this variable in functions
            (e.g., 'tutorial.apiKey').
        value:
          type: string
          description: The variable value (masked for secrets).
        secret:
          type: boolean
          description: Whether this variable is stored as a secret.
        visibility:
          type: string
          enum:
            - public
            - private
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VariableInput:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
        description:
          type: string
        pathIdentifier:
          type: string
        value:
          type: string
        secret:
          type: boolean
          default: false

    Trigger:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the trigger.
        name:
          type: string
          description: The name of the trigger.
        description:
          type: string
          description: A description of the trigger.
        sourceType:
          type: string
          description: The type of event source (e.g., webhook, cloud event).
        sourceId:
          type: string
          description: The ID of the event source.
        targetFunctionId:
          type: string
          description: The ID of the function to trigger.
        targetFunctionType:
          type: string
          enum:
            - server
            - api
          description: The type of function to trigger.
        state:
          type: string
          enum:
            - active
            - inactive
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TriggerInput:
      type: object
      required:
        - name
        - sourceType
        - sourceId
        - targetFunctionId
        - targetFunctionType
      properties:
        name:
          type: string
        description:
          type: string
        sourceType:
          type: string
        sourceId:
          type: string
        targetFunctionId:
          type: string
        targetFunctionType:
          type: string
          enum:
            - server
            - api

    Job:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the job.
        name:
          type: string
          description: The name of the job.
        description:
          type: string
          description: A description of the job.
        functionId:
          type: string
          description: The ID of the function to execute.
        functionType:
          type: string
          enum:
            - server
            - api
          description: The type of function to execute.
        schedule:
          type: string
          description: >-
            The CRON expression or interval defining when the job runs.
        state:
          type: string
          enum:
            - active
            - inactive
        lastRunAt:
          type: string
          format: date-time
          description: Timestamp of the last execution.
        nextRunAt:
          type: string
          format: date-time
          description: Timestamp of the next scheduled execution.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JobInput:
      type: object
      required:
        - name
        - functionId
        - functionType
        - schedule
      properties:
        name:
          type: string
        description:
          type: string
        functionId:
          type: string
        functionType:
          type: string
          enum:
            - server
            - api
        schedule:
          type: string
          description: CRON expression or interval.

    Schema:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the schema.
        name:
          type: string
          description: The name of the schema.
        description:
          type: string
          description: A description of the schema.
        context:
          type: string
          description: The context path for organizing the schema.
        definition:
          type: object
          description: The JSON Schema definition.
        visibility:
          type: string
          enum:
            - public
            - private
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SchemaInput:
      type: object
      required:
        - name
        - definition
      properties:
        name:
          type: string
        description:
          type: string
        context:
          type: string
        definition:
          type: object
          description: The JSON Schema definition.

    Environment:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the environment.
        name:
          type: string
          description: The name of the environment.
        description:
          type: string
          description: A description of the environment.
        contextName:
          type: string
          description: The context name attribute for the environment.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the conversation.
        slug:
          type: string
          description: The slug identifier for the conversation.
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - user
                  - assistant
              content:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationInput:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The initial message to start the conversation.

    Error:
      type: object
      properties:
        statusCode:
          type: integer
          description: The HTTP status code.
        message:
          type: string
          description: A human-readable error message.
        error:
          type: string
          description: The error type.
