openapi: 3.1.0
info:
  title: PolyAPI Platform API
  description: >-
    PolyAPI is a modern enterprise middleware platform that provides a unified
    REST API for managing cloud service resources including functions, variables,
    webhooks, triggers, jobs, schemas, and environments. Built using AI and
    Kubernetes-native technology, it accelerates development and simplifies the
    operation of integrations, orchestrations, and microservices.
  version: 1.0.0
  contact:
    name: PolyAPI
    url: https://polyapi.io/
  license:
    name: Proprietary
    url: https://polyapi.io/
  termsOfService: https://polyapi.io/

externalDocs:
  description: PolyAPI Documentation
  url: https://docs.polyapi.io/

servers:
  - url: https://na1.polyapi.io
    description: North America (AWS us-west-2)
  - url: https://eu1.polyapi.io
    description: Europe (AWS eu-west-1)

security:
  - bearerAuth: []

tags:
  - name: API Functions
    description: >-
      Manage API functions that wrap third-party API calls and are invoked
      through the PolyAPI gateway.
  - name: Server Functions
    description: >-
      Manage Knative serverless functions that run in the PolyAPI cloud
      infrastructure.
  - name: Client Functions
    description: >-
      Manage shared client functions that run wherever they are executed.
  - name: Webhooks
    description: >-
      Manage webhook endpoints that receive events via HTTP calls, with support
      for authentication and custom listeners.
  - name: Variables
    description: >-
      Manage variables and secrets that are stored securely and injected into
      functions at runtime.
  - name: Triggers
    description: >-
      Manage triggers that connect cloud events to functions for event-driven
      execution.
  - name: Jobs
    description: >-
      Manage jobs that execute functions at a set time, interval, or CRON
      schedule.
  - name: Schemas
    description: >-
      Manage shared JSON Schema definitions used to type events and application
      data.
  - name: Environments
    description: >-
      Manage environments for organizing and deploying resources across
      development, staging, and production.
  - name: Assistants
    description: >-
      Manage AI assistants and conversations for AI-powered document assistance
      and discovery.

paths:
  /functions/api:
    get:
      operationId: listApiFunctions
      summary: List API functions
      description: Retrieve a list of all API functions in the current environment.
      tags:
        - API Functions
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
      responses:
        '200':
          description: A list of API functions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiFunction'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createApiFunction
      summary: Create an API function
      description: Create a new API function that wraps a third-party API call.
      tags:
        - API Functions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiFunctionInput'
      responses:
        '201':
          description: The created API function.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiFunction'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /functions/api/{functionId}:
    get:
      operationId: getApiFunction
      summary: Get an API function
      description: Retrieve details of a specific API function by its ID.
      tags:
        - API Functions
      parameters:
        - $ref: '#/components/parameters/functionIdParam'
      responses:
        '200':
          description: The API function details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiFunction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateApiFunction
      summary: Update an API function
      description: Update an existing API function.
      tags:
        - API Functions
      parameters:
        - $ref: '#/components/parameters/functionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiFunctionInput'
      responses:
        '200':
          description: The updated API function.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiFunction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteApiFunction
      summary: Delete an API function
      description: Delete a specific API function by its ID.
      tags:
        - API Functions
      parameters:
        - $ref: '#/components/parameters/functionIdParam'
      responses:
        '204':
          description: The API function was deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /functions/api/{functionId}/execute:
    post:
      operationId: executeApiFunction
      summary: Execute an API function
      description: >-
        Execute an API function by its ID. Requires the Execute Functions
        permission. Variables can be injected using PolyVariable objects in
        the request body.
      tags:
        - API Functions
      parameters:
        - $ref: '#/components/parameters/functionIdParam'
